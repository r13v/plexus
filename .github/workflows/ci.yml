name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: go test
        run: go test ./... -race

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1

  tag:
    name: tag
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # RELEASE_TAG_TOKEN must be a PAT (or GitHub App token) — tags pushed
      # with the default GITHUB_TOKEN do not fire dependent workflows
      # (release.yml triggers on tag push), so the release pipeline only
      # runs when this secret is configured.
      - name: bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.RELEASE_TAG_TOKEN || secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main
